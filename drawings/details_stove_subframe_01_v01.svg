<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#202020"/>
    </marker>
    <pattern id="wood" patternUnits="userSpaceOnUse" width="24" height="18">
      <rect width="24" height="18" fill="#c88f4d"/>
      <path d="M0 9 H24" stroke="#8c5b2b" stroke-width="1"/>
      <path d="M3 4 C8 8, 15 1, 22 7" fill="none" stroke="#9d6933" stroke-width="1"/>
    </pattern>
    <pattern id="osb" patternUnits="userSpaceOnUse" width="32" height="24">
      <rect width="32" height="24" fill="#e4b96f"/>
      <path d="M3 5 L15 2 M18 10 L30 6 M6 18 L24 21 M12 13 L20 17" stroke="#b88542" stroke-width="2"/>
    </pattern>
    <style>
      .sheet { fill: #f7f4ec; }
      .border { fill: none; stroke: #202020; stroke-width: 3; }
      .panel { fill: #fffdf7; stroke: #202020; stroke-width: 2; }
      .title { font-family: Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #202020; }
      .h2 { font-family: Arial, sans-serif; font-size: 25px; font-weight: 700; fill: #202020; }
      .txt { font-family: Arial, sans-serif; font-size: 22px; fill: #202020; }
      .small { font-family: Arial, sans-serif; font-size: 18px; fill: #202020; }
      .tiny { font-family: Arial, sans-serif; font-size: 15px; fill: #202020; }
      .beam { fill: url(#wood); stroke: #6f421c; stroke-width: 2; }
      .block { fill: #b97535; stroke: #6f421c; stroke-width: 2; }
      .deck { fill: url(#osb); stroke: #8c5b2b; stroke-width: 2; }
      .stove { fill: #aab0b5; stroke: #33383d; stroke-width: 3; }
      .stone { fill: #7c8084; stroke: #33383d; stroke-width: 2; }
      .firepad { fill: #eee1d0; stroke: #8d4d22; stroke-width: 3; }
      .steel { fill: #d9dde0; stroke: #6b7378; stroke-width: 2; }
      .noncomb { fill: #efe7d8; stroke: #8d4d22; stroke-width: 2; }
      .dim { stroke: #202020; stroke-width: 2; marker-end: url(#arrow); marker-start: url(#arrow); fill: none; }
      .lead { stroke: #202020; stroke-width: 2; fill: none; }
      .dash { stroke: #236b7a; stroke-width: 3; stroke-dasharray: 10 8; fill: none; }
      .warn { fill: #fff1f0; stroke: #b42318; stroke-width: 3; }
      .note { fill: #eef7e8; stroke: #5f7a3d; stroke-width: 2; }
      .label { fill: #fffdf7; stroke: #202020; stroke-width: 1.5; }
    </style>
  </defs>

  <rect class="sheet" width="1800" height="1200"/>
  <rect class="border" x="40" y="40" width="1720" height="1120"/>
  <text class="title" x="80" y="95">Узел 02. Подрамник и площадка под дровяную печь</text>
  <text class="txt" x="80" y="130">Статус: предварительная схема. Финальные отступы и размеры — по паспорту выбранной печи.</text>

  <!-- Top plan -->
  <rect class="panel" x="80" y="175" width="820" height="555"/>
  <text class="h2" x="110" y="220">A. Вид сверху: нагрузку разнести на 3–4 балки</text>
  <text class="small" x="110" y="250">Фрагмент пола без чердака вокруг</text>

  <rect class="beam" x="130" y="330" width="48" height="330"/>
  <rect class="beam" x="397" y="330" width="48" height="330"/>
  <rect class="beam" x="664" y="330" width="48" height="330"/>
  <rect class="beam" x="820" y="330" width="48" height="330"/>

  <rect class="block" x="178" y="360" width="219" height="28"/>
  <rect class="block" x="445" y="360" width="219" height="28"/>
  <rect class="block" x="712" y="360" width="108" height="28"/>
  <rect class="block" x="178" y="475" width="219" height="28"/>
  <rect class="block" x="445" y="475" width="219" height="28"/>
  <rect class="block" x="712" y="475" width="108" height="28"/>
  <rect class="block" x="178" y="590" width="219" height="28"/>
  <rect class="block" x="445" y="590" width="219" height="28"/>
  <rect class="block" x="712" y="590" width="108" height="28"/>

  <rect class="dash" x="210" y="345" width="545" height="295"/>
  <rect class="deck" x="260" y="390" width="420" height="205"/>
  <rect class="firepad" x="315" y="420" width="310" height="145"/>
  <rect class="stove" x="405" y="448" width="130" height="90"/>
  <circle class="stone" cx="430" cy="465" r="10"/>
  <circle class="stone" cx="455" cy="466" r="9"/>
  <circle class="stone" cx="483" cy="466" r="11"/>
  <circle class="stone" cx="510" cy="466" r="9"/>
  <rect class="steel" x="345" y="565" width="250" height="48"/>

  <text class="tiny" x="280" y="382">2 слоя настила, швы вразбежку</text>
  <text class="tiny" x="324" y="414">негорючая площадка</text>
  <text class="tiny" x="398" y="545">печь условно</text>
  <text class="tiny" x="352" y="628">лист/защита перед дверцей</text>

  <line class="dim" x1="178" y1="295" x2="397" y2="295"/>
  <text class="small" x="260" y="286">450 прогал</text>
  <line class="dim" x1="130" y1="275" x2="178" y2="275"/>
  <text class="small" x="140" y="266">100</text>
  <line class="dim" x1="315" y1="680" x2="625" y2="680"/>
  <text class="small" x="415" y="706">~1200–1400*</text>
  <line class="dim" x1="700" y1="420" x2="700" y2="565"/>
  <text class="small" x="710" y="498">~900–1100*</text>

  <text class="tiny" x="115" y="705">* предварительно, уточнить после выбора печи</text>

  <!-- Section -->
  <rect class="panel" x="950" y="175" width="760" height="555"/>
  <text class="h2" x="980" y="220">B. Разрез: несущая часть ≠ пожарная защита</text>
  <rect class="beam" x="1015" y="590" width="610" height="58"/>
  <rect class="deck" x="1015" y="548" width="610" height="42"/>
  <rect class="deck" x="1015" y="506" width="610" height="42"/>
  <rect class="noncomb" x="1110" y="468" width="420" height="38"/>
  <rect class="steel" x="1140" y="444" width="360" height="24"/>
  <rect class="stove" x="1225" y="360" width="190" height="84"/>
  <circle class="stone" cx="1260" cy="378" r="10"/>
  <circle class="stone" cx="1288" cy="378" r="11"/>
  <circle class="stone" cx="1317" cy="378" r="9"/>
  <circle class="stone" cx="1346" cy="378" r="10"/>
  <text class="small" x="1252" y="426">печь</text>

  <text class="small" x="1040" y="635">балки 100 x 200 + перемычки</text>
  <text class="small" x="1040" y="577">1-й слой: фанера ФСФ 21 или OSB-3/4 22</text>
  <text class="small" x="1040" y="535">2-й слой: листовой настил, швы вразбежку</text>
  <text class="small" x="1040" y="496">негорючая плита/заводское основание</text>
  <text class="small" x="1040" y="462">стальной лист/защита по паспорту печи</text>
  <text class="tiny" x="1160" y="690">Фанера/OSB несут нагрузку, но не являются пожарной защитой.</text>

  <!-- Notes -->
  <rect class="warn" x="80" y="770" width="820" height="290"/>
  <text class="h2" x="110" y="815">Что обязательно проверить</text>
  <text class="small" x="110" y="855">1. Модель печи: масса печи + камней + защитного основания.</text>
  <text class="small" x="110" y="890">2. Паспортные отступы до горючих стен, пола и дверцы.</text>
  <text class="small" x="110" y="925">3. Состояние балок и опирание на стены.</text>
  <text class="small" x="110" y="960">4. Где окажется топочная дверца: внутрь парной или через стену.</text>
  <text class="small" x="110" y="995">5. Крепление перемычек: без ослабления балок сверлением и вырезами.</text>
  <text class="small" x="110" y="1030">6. Дымоход и проход стены считаются отдельным узлом.</text>

  <rect class="note" x="950" y="770" width="760" height="210"/>
  <text class="h2" x="980" y="815">Почему такие материалы</text>
  <text class="small" x="980" y="855">- 2 слоя листового настила легче стяжки и распределяют нагрузку.</text>
  <text class="small" x="980" y="890">- Перемычки связывают балки и уменьшают местную податливость.</text>
  <text class="small" x="980" y="925">- Негорючая плита нужна, потому что дерево/OSB горючие.</text>
  <text class="small" x="980" y="960">- Стальной лист перед дверцей защищает пол от углей и искр.</text>

  <rect class="panel" x="950" y="1005" width="760" height="95"/>
  <text class="h2" x="980" y="1042">Источники</text>
  <text class="tiny" x="980" y="1070">МЧС: требования к печам/дымоходам.</text>
  <text class="tiny" x="980" y="1092">Паспорта Harvia/Эверест: отступы зависят от модели.</text>

  <rect class="panel" x="1245" y="1120" width="465" height="32"/>
  <text class="tiny" x="1260" y="1142">Лист: details_stove_subframe_01_v01, единицы: мм</text>
</svg>
